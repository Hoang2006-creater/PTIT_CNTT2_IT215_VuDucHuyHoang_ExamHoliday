<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="sidebar-fragment" id="sidebar" class="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-egg-fried"></i>
            <span>RMS Restaurant</span>
        </div>

        <ul class="sidebar-menu" style="overflow-y: auto; flex-grow: 1; margin: 0; padding: 15px 0;">
            <!-- Common Link -->
            <li class="sidebar-menu-item">
                <a href="/dashboard" class="sidebar-menu-link">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <!-- Admin specific -->
            <li class="sidebar-menu-item" data-role-required="ADMIN">
                <a href="/accounts" class="sidebar-menu-link">
                    <i class="bi bi-shield-lock-fill"></i>
                    <span>Quản lý tài khoản</span>
                </a>
            </li>
            <li class="sidebar-menu-item" data-role-required="ADMIN">
                <a href="/employees" class="sidebar-menu-link">
                    <i class="bi bi-people-fill"></i>
                    <span>Quản lý nhân viên</span>
                </a>
            </li>

            <!-- Manager specific -->
            <li class="sidebar-menu-item" data-role-required="MANAGER">
                <a href="/customers" class="sidebar-menu-link">
                    <i class="bi bi-person-badge-fill"></i>
                    <span>Quản lý khách hàng</span>
                </a>
            </li>
            <li class="sidebar-menu-item" data-role-required="MANAGER">
                <a href="/menu" class="sidebar-menu-link">
                    <i class="bi bi-journals"></i>
                    <span>Quản lý thực đơn</span>
                </a>
            </li>
            <li class="sidebar-menu-item" data-role-required="MANAGER">
                <a href="/tables/map" class="sidebar-menu-link">
                    <i class="bi bi-grid-3x3-gap-fill"></i>
                    <span>Quản lý bàn ăn</span>
                </a>
            </li>
            <li class="sidebar-menu-item" data-role-required="MANAGER">
                <a href="/reservations" class="sidebar-menu-link">
                    <i class="bi bi-calendar-event"></i>
                    <span>Quản lý đặt bàn</span>
                </a>
            </li>
            <li class="sidebar-menu-item" data-role-required="MANAGER">
                <a href="/orders" class="sidebar-menu-link">
                    <i class="bi bi-receipt"></i>
                    <span>Quản lý gọi món</span>
                </a>
            </li>
            <li class="sidebar-menu-item" data-role-required="CASHIER">
                <a href="/payments" class="sidebar-menu-link">
                    <i class="bi bi-wallet2"></i>
                    <span>Quản lý thanh toán</span>
                </a>
            </li>
            <li class="sidebar-menu-item" data-role-required="MANAGER">
                <a href="/promotions" class="sidebar-menu-link">
                    <i class="bi bi-gift-fill"></i>
                    <span>Quản lý khuyến mãi</span>
                </a>
            </li>
            <li class="sidebar-menu-item" data-role-required="MANAGER">
                <a href="/reports" class="sidebar-menu-link">
                    <i class="bi bi-graph-up-arrow"></i>
                    <span>Thống kê</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a href="/profile" class="sidebar-menu-link">
                    <i class="bi bi-gear-fill"></i>
                    <span>Cài đặt</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <small class="text-muted d-block text-center">Version 1.1.0</small>
        </div>
    </div>
</body>

</html>
