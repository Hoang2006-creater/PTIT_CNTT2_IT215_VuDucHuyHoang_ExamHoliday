<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Khuyến mãi', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card p-4">
                    <h3 class="text-white mb-4"><i class="bi bi-gift-fill text-primary me-2"></i>Chương trình khuyến mãi</h3>
                    <hr class="border-secondary mb-4">
                    
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Mã giảm giá</th>
                                    <th>Chiết khấu (%)</th>
                                    <th>Thời gian áp dụng</th>
                                    <th>Kích hoạt</th>
                                </tr>
                            </thead>
                            <tbody id="promotions-table-body">
                                <tr>
                                    <td colspan="5" class="text-center text-secondary py-4">Đang tải danh sách khuyến mãi...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    const response = await customFetch('/api/promotions'); // Assuming endpoint exists
                    if (response.ok) {
                        const result = await response.json();
                        const tableBody = document.getElementById('promotions-table-body');
                        tableBody.innerHTML = '';
                        
                        if (result.success && result.data && result.data.length > 0) {
                            result.data.forEach(p => {
                                const tr = document.createElement('tr');
                                tr.innerHTML = `
                                    <td>${p.id}</td>
                                    <td class="text-primary font-weight-bold">${p.code}</td>
                                    <td><span class="text-white font-weight-bold">${p.discountPercentage}%</span></td>
                                    <td>${p.startDate} ~ ${p.endDate}</td>
                                    <td><span class="badge bg-${p.active ? 'success' : 'secondary'}">${p.active ? 'ĐANG CHẠY' : 'DỪNG'}</span></td>
                                `;
                                tableBody.appendChild(tr);
                            });
                        } else {
                            tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-secondary py-4">Chưa có mã khuyến mãi nào được tạo.</td></tr>';
                        }
                    }
                } catch (e) {
                    console.error('Failed to load promotions:', e);
                }
            });
        </script>
    </div>
</body>
</html>
