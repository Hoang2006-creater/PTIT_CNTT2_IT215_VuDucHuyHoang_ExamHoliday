<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Khuyến mãi', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="text-white mb-0"><i class="bi bi-gift-fill text-primary me-2"></i>Chương trình khuyến mãi</h3>
                        <button class="btn btn-primary-glass btn-sm" onclick="showCreateModal()"><i class="bi bi-plus-circle me-2"></i>Thêm Khuyến Mãi</button>
                    </div>
                    <hr class="border-secondary mb-4">
                    
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-striped align-middle" style="font-size: 13px;">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Mã khuyến mãi</th>
                                    <th>Mô tả</th>
                                    <th>Loại giảm giá</th>
                                    <th>Giá trị giảm</th>
                                    <th>Đơn tối thiểu</th>
                                    <th>Ngày bắt đầu</th>
                                    <th>Ngày kết thúc</th>
                                    <th>Trạng thái</th>
                                    <th class="text-end" style="width: 130px;">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="promotions-table-body">
                                <tr>
                                    <td colspan="10" class="text-center text-secondary py-4">
                                        <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div> Đang tải danh sách khuyến mãi...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Promotion Modal (Create/Edit) -->
        <div class="modal fade" id="promotionModal" tabindex="-1" aria-labelledby="promotionModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content text-white" style="background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid var(--border-glass); border-radius: 16px;">
                    <div class="modal-header border-bottom border-secondary">
                        <h5 class="modal-title font-serif text-gold" id="promotionModalLabel">Thêm Khuyến Mãi Mới</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="promotionForm">
                        <div class="modal-body p-4">
                            <input type="hidden" id="promoId">
                            
                            <div class="mb-3">
                                <label for="promoCode" class="form-label text-white-50 small">Mã Khuyến Mãi <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-glass" id="promoCode" required placeholder="Ví dụ: KM50K, GIAM10">
                            </div>
                            
                            <div class="mb-3">
                                <label for="promoDescription" class="form-label text-white-50 small">Mô Tả</label>
                                <textarea class="form-control form-control-glass" id="promoDescription" rows="2" placeholder="Chi tiết khuyến mãi..."></textarea>
                            </div>
                            
                            <div class="row g-3 mb-3">
                                <div class="col-6">
                                    <label for="promoDiscountType" class="form-label text-white-50 small">Loại Giảm Giá <span class="text-danger">*</span></label>
                                    <select class="form-select form-control-glass" id="promoDiscountType" required>
                                        <option value="PERCENT">Phần trăm (%)</option>
                                        <option value="VALUE">Số tiền cố định (đ)</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label for="promoDiscountValue" class="form-label text-white-50 small">Giá Trị Giảm <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control form-control-glass" id="promoDiscountValue" required min="1">
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="promoMinOrderValue" class="form-label text-white-50 small">Đơn Hàng Tối Thiểu (đ)</label>
                                <input type="number" class="form-control form-control-glass" id="promoMinOrderValue" value="0" min="0">
                            </div>
                            
                            <div class="row g-3 mb-3">
                                <div class="col-6">
                                    <label for="promoStartDate" class="form-label text-white-50 small">Ngày Bắt Đầu <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control form-control-glass" id="promoStartDate" required>
                                </div>
                                <div class="col-6">
                                    <label for="promoEndDate" class="form-label text-white-50 small">Ngày Kết Thúc <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control form-control-glass" id="promoEndDate" required>
                                </div>
                            </div>
                            
                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" role="switch" id="promoIsActive" checked>
                                <label class="form-check-label text-white-50 small" for="promoIsActive">Kích hoạt ngay</label>
                            </div>
                        </div>
                        <div class="modal-footer border-top border-secondary">
                            <button type="button" class="btn btn-outline-light btn-sm rounded-pill px-3" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary-glass btn-sm rounded-pill px-4" id="btnSavePromo"><i class="bi bi-save me-1"></i>Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            let allPromotions = [];
            let promotionModal = null;

            document.addEventListener('DOMContentLoaded', () => {
                promotionModal = new bootstrap.Modal(document.getElementById('promotionModal'));
                
                // Toggle discount value validation based on selected type
                document.getElementById('promoDiscountType').addEventListener('change', (e) => {
                    const valInput = document.getElementById('promoDiscountValue');
                    if (e.target.value === 'PERCENT') {
                        valInput.max = 100;
                        valInput.placeholder = "Phần trăm chiết khấu (1 - 100)";
                    } else {
                        valInput.removeAttribute('max');
                        valInput.placeholder = "Số tiền chiết khấu cố định";
                    }
                });

                loadPromotions();
            });

            async function loadPromotions() {
                const tableBody = document.getElementById('promotions-table-body');
                try {
                    const response = await customFetch('/api/promotions');
                    if (response.ok) {
                        const result = await response.json();
                        tableBody.innerHTML = '';
                        
                        if (result.success && result.data && result.data.length > 0) {
                            allPromotions = result.data;
                            allPromotions.forEach(p => {
                                const tr = document.createElement('tr');
                                const discountTypeStr = (p.discountPercentage && p.discountPercentage > 0) ? 'Phần trăm (%)' : 'Số tiền (đ)';
                                const discountValStr = (p.discountPercentage && p.discountPercentage > 0) ? `${p.discountPercentage}%` : `${(p.discountValue || 0).toLocaleString('vi-VN')}đ`;
                                
                                tr.innerHTML = `
                                    <td>${p.id}</td>
                                    <td class="text-primary font-weight-bold">${p.code}</td>
                                    <td class="small text-secondary">${p.description || '-'}</td>
                                    <td>${discountTypeStr}</td>
                                    <td class="text-white font-weight-bold">${discountValStr}</td>
                                    <td>${(p.minOrderValue || 0).toLocaleString('vi-VN')}đ</td>
                                    <td>${p.startDate}</td>
                                    <td>${p.endDate}</td>
                                    <td><span class="badge bg-${p.active ? 'success' : 'secondary'}">${p.active ? 'ĐANG CHẠY' : 'DỪNG'}</span></td>
                                    <td class="text-end">
                                        <div class="d-flex justify-content-end gap-1">
                                            <button class="btn btn-outline-light btn-xs rounded-pill px-2 py-0" onclick="editPromo(${p.id})" style="font-size: 11px;"><i class="bi bi-pencil"></i></button>
                                            <button class="btn btn-outline-warning btn-xs rounded-pill px-2 py-0" onclick="togglePromo(${p.id})" style="font-size: 11px;"><i class="bi bi-power"></i></button>
                                            <button class="btn btn-outline-danger btn-xs rounded-pill px-2 py-0" onclick="deletePromo(${p.id})" style="font-size: 11px;"><i class="bi bi-trash"></i></button>
                                        </div>
                                    </td>
                                `;
                                tableBody.appendChild(tr);
                            });
                        } else {
                            allPromotions = [];
                            tableBody.innerHTML = '<tr><td colspan="10" class="text-center text-secondary py-4">Chưa có mã khuyến mãi nào được tạo.</td></tr>';
                        }
                    } else {
                        tableBody.innerHTML = `<tr><td colspan="10" class="text-center text-danger py-4"><i class="bi bi-exclamation-triangle me-2"></i> Lỗi tải dữ liệu từ máy chủ (HTTP ${response.status}).</td></tr>`;
                    }
                } catch (e) {
                    console.error('Failed to load promotions:', e);
                    tableBody.innerHTML = '<tr><td colspan="10" class="text-center text-danger py-4"><i class="bi bi-exclamation-triangle me-2"></i> Không thể kết nối đến máy chủ.</td></tr>';
                }
            }

            function showCreateModal() {
                document.getElementById('promotionModalLabel').textContent = "Thêm Khuyến Mãi Mới";
                document.getElementById('promotionForm').reset();
                document.getElementById('promoId').value = "";
                document.getElementById('promoCode').removeAttribute('readonly');
                document.getElementById('promoDiscountType').dispatchEvent(new Event('change'));
                promotionModal.show();
            }

            function editPromo(id) {
                const promo = allPromotions.find(p => p.id === id);
                if (!promo) return;

                document.getElementById('promotionModalLabel').textContent = "Cập Nhật Khuyến Mãi";
                document.getElementById('promoId').value = promo.id;
                document.getElementById('promoCode').value = promo.code;
                document.getElementById('promoCode').setAttribute('readonly', 'true');
                document.getElementById('promoDescription').value = promo.description || '';
                
                const isPercent = promo.discountPercentage && promo.discountPercentage > 0;
                document.getElementById('promoDiscountType').value = isPercent ? 'PERCENT' : 'VALUE';
                document.getElementById('promoDiscountType').dispatchEvent(new Event('change'));
                document.getElementById('promoDiscountValue').value = isPercent ? promo.discountPercentage : promo.discountValue;
                
                document.getElementById('promoMinOrderValue').value = promo.minOrderValue || 0;
                document.getElementById('promoStartDate').value = promo.startDate;
                document.getElementById('promoEndDate').value = promo.endDate;
                document.getElementById('promoIsActive').checked = promo.active;

                promotionModal.show();
            }

            document.getElementById('promotionForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('promoId').value;
                const code = document.getElementById('promoCode').value.trim();
                const description = document.getElementById('promoDescription').value.trim();
                const discountType = document.getElementById('promoDiscountType').value;
                const discountVal = parseFloat(document.getElementById('promoDiscountValue').value);
                const minOrderValue = parseFloat(document.getElementById('promoMinOrderValue').value || 0);
                const startDate = document.getElementById('promoStartDate').value;
                const endDate = document.getElementById('promoEndDate').value;
                const active = document.getElementById('promoIsActive').checked;

                // Validate
                if (discountType === 'PERCENT' && (discountVal < 1 || discountVal > 100)) {
                    showToast('Phần trăm giảm giá phải nằm trong khoảng từ 1 đến 100.', 'warning');
                    return;
                }
                if (discountVal < 0) {
                    showToast('Giá trị giảm giá không được âm.', 'warning');
                    return;
                }
                if (minOrderValue < 0) {
                    showToast('Đơn tối thiểu không được âm.', 'warning');
                    return;
                }
                if (startDate > endDate) {
                    showToast('Ngày bắt đầu phải nhỏ hơn hoặc bằng ngày kết thúc.', 'warning');
                    return;
                }

                const payload = {
                    code,
                    description,
                    discountPercentage: discountType === 'PERCENT' ? parseInt(discountVal) : null,
                    discountValue: discountType === 'VALUE' ? discountVal : null,
                    minOrderValue,
                    startDate,
                    endDate,
                    active
                };

                const saveBtn = document.getElementById('btnSavePromo');
                saveBtn.disabled = true;
                showLoading(true);

                const url = id ? `/api/promotions/${id}` : '/api/promotions';
                const method = id ? 'PUT' : 'POST';

                try {
                    const response = await customFetch(url, {
                        method,
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    showLoading(false);
                    saveBtn.disabled = false;

                    if (response.ok && result.success) {
                        showToast(id ? 'Cập nhật khuyến mãi thành công!' : 'Thêm khuyến mãi thành công!', 'success');
                        promotionModal.hide();
                        await loadPromotions();
                    } else {
                        showToast(result.message || 'Lưu khuyến mãi thất bại.', 'error');
                    }
                } catch (err) {
                    showLoading(false);
                    saveBtn.disabled = false;
                    console.error(err);
                    showToast('Lỗi kết nối máy chủ.', 'error');
                }
            });

            async function togglePromo(id) {
                showLoading(true);
                try {
                    const response = await customFetch(`/api/promotions/${id}/toggle`, {
                        method: 'PUT'
                    });
                    const result = await response.json();
                    showLoading(false);
                    if (response.ok && result.success) {
                        showToast('Đã thay đổi trạng thái hoạt động.', 'success');
                        await loadPromotions();
                    } else {
                        showToast(result.message || 'Thay đổi trạng thái thất bại.', 'error');
                    }
                } catch (err) {
                    showLoading(false);
                    console.error(err);
                    showToast('Lỗi kết nối máy chủ.', 'error');
                }
            }

            async function deletePromo(id) {
                if (!confirm('Bạn có chắc chắn muốn xóa chương trình khuyến mãi này?')) return;
                
                showLoading(true);
                try {
                    const response = await customFetch(`/api/promotions/${id}`, {
                        method: 'DELETE'
                    });
                    const result = await response.json();
                    showLoading(false);
                    if (response.ok && result.success) {
                        showToast('Xóa khuyến mãi thành công!', 'success');
                        await loadPromotions();
                    } else {
                        showToast(result.message || 'Xóa khuyến mãi thất bại.', 'error');
                    }
                } catch (err) {
                    showLoading(false);
                    console.error(err);
                    showToast('Lỗi kết nối máy chủ.', 'error');
                }
            }
        </script>
    </div>
</body>
</html>
