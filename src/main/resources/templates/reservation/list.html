<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Lịch sử đặt bàn', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card p-4">
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <h3 class="text-white m-0"><i class="bi bi-calendar-event text-primary me-2"></i>Lịch sử đặt bàn</h3>
                        <a href="/reservations/create" class="btn btn-primary-glass btn-sm"><i class="bi bi-calendar-plus me-2"></i>Đặt bàn mới</a>
                    </div>
                    
                    <hr class="border-secondary mb-4">
                    
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-striped align-middle" style="font-size: 13px;">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Khách hàng</th>
                                    <th>Số điện thoại</th>
                                    <th>Số lượng khách</th>
                                    <th>Thời gian hẹn</th>
                                    <th>Trạng thái</th>
                                    <th class="text-end" style="width: 200px;">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="reservations-table-body">
                                <tr>
                                    <td colspan="7" class="text-center text-secondary py-4">
                                        <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div> Đang tải lịch sử đặt bàn...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script>
            async function loadReservations() {
                const tableBody = document.getElementById('reservations-table-body');
                try {
                    const response = await customFetch('/api/reservations');
                    if (response.ok) {
                        const result = await response.json();
                        tableBody.innerHTML = '';
                        
                        if (result.success && result.data && result.data.length > 0) {
                            result.data.forEach(res => {
                                const tr = document.createElement('tr');
                                const dt = new Date(res.reservationTime).toLocaleString('vi-VN');
                                
                                // Badge styling
                                let badgeClass = 'secondary';
                                let statusText = res.status;
                                if (res.status === 'PENDING') {
                                    badgeClass = 'warning text-dark';
                                    statusText = 'CHỜ XÁC NHẬN';
                                } else if (res.status === 'CONFIRMED') {
                                    badgeClass = 'primary';
                                    statusText = 'ĐÃ XÁC NHẬN';
                                } else if (res.status === 'COMPLETED') {
                                    badgeClass = 'success';
                                    statusText = 'HOÀN THÀNH';
                                } else if (res.status === 'CANCELLED') {
                                    badgeClass = 'danger';
                                    statusText = 'ĐÃ HỦY';
                                }
                                
                                // Actions buttons
                                let actionsHtml = '-';
                                if (res.status === 'PENDING') {
                                    actionsHtml = `
                                        <div class="d-flex justify-content-end gap-1">
                                            <button class="btn btn-outline-success btn-xs rounded-pill px-2 py-0" onclick="confirmReservation(${res.id})" style="font-size: 11px;"><i class="bi bi-check-circle"></i> Xác nhận</button>
                                            <button class="btn btn-outline-danger btn-xs rounded-pill px-2 py-0" onclick="cancelReservation(${res.id})" style="font-size: 11px;"><i class="bi bi-x-circle"></i> Hủy</button>
                                        </div>
                                    `;
                                } else if (res.status === 'CONFIRMED') {
                                    actionsHtml = `
                                        <div class="d-flex justify-content-end gap-1">
                                            <button class="btn btn-outline-success btn-xs rounded-pill px-2 py-0" onclick="completeReservation(${res.id})" style="font-size: 11px;"><i class="bi bi-check2-all"></i> Hoàn thành</button>
                                            <button class="btn btn-outline-danger btn-xs rounded-pill px-2 py-0" onclick="cancelReservation(${res.id})" style="font-size: 11px;"><i class="bi bi-x-circle"></i> Hủy</button>
                                        </div>
                                    `;
                                }
                                
                                tr.innerHTML = `
                                    <td>${res.id}</td>
                                    <td class="text-white font-weight-bold">${res.customerName}</td>
                                    <td>${res.customerPhone}</td>
                                    <td>${res.guestCount} người</td>
                                    <td>${dt}</td>
                                    <td><span class="badge bg-${badgeClass}" style="font-size: 11px;">${statusText}</span></td>
                                    <td class="text-end">${actionsHtml}</td>
                                `;
                                tableBody.appendChild(tr);
                            });
                        } else {
                            tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-secondary py-4">Không tìm thấy yêu cầu đặt bàn nào.</td></tr>';
                        }
                    } else {
                        tableBody.innerHTML = `<tr><td colspan="7" class="text-center text-danger py-4"><i class="bi bi-exclamation-triangle me-2"></i> Lỗi tải danh sách từ máy chủ (HTTP ${response.status}).</td></tr>`;
                    }
                } catch (e) {
                    console.error('Failed to load reservations list:', e);
                    tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-4"><i class="bi bi-exclamation-triangle me-2"></i> Không thể kết nối đến máy chủ.</td></tr>';
                }
            }

            document.addEventListener('DOMContentLoaded', loadReservations);

            async function confirmReservation(id) {
                showLoading(true);
                try {
                    const response = await customFetch(`/api/reservations/${id}/confirm`, {
                        method: 'PUT'
                    });
                    const result = await response.json();
                    showLoading(false);
                    if (response.ok && result.success) {
                        showToast('Xác nhận đặt bàn thành công!', 'success');
                        await loadReservations();
                    } else {
                        showToast(result.message || 'Xác nhận đặt bàn thất bại.', 'error');
                    }
                } catch (e) {
                    showLoading(false);
                    console.error(e);
                    showToast('Lỗi kết nối máy chủ.', 'error');
                }
            }

            async function completeReservation(id) {
                showLoading(true);
                try {
                    const response = await customFetch(`/api/reservations/${id}/complete`, {
                        method: 'PUT'
                    });
                    const result = await response.json();
                    showLoading(false);
                    if (response.ok && result.success) {
                        showToast('Đã hoàn thành lượt dùng bữa của khách!', 'success');
                        await loadReservations();
                    } else {
                        showToast(result.message || 'Hoàn thành đặt bàn thất bại.', 'error');
                    }
                } catch (e) {
                    showLoading(false);
                    console.error(e);
                    showToast('Lỗi kết nối máy chủ.', 'error');
                }
            }

            async function cancelReservation(id) {
                if (!confirm('Bạn có chắc chắn muốn hủy lịch đặt bàn này không?')) return;
                showLoading(true);
                try {
                    const response = await customFetch(`/api/reservations/${id}/cancel`, {
                        method: 'PUT'
                    });
                    const result = await response.json();
                    showLoading(false);
                    if (response.ok && result.success) {
                        showToast('Hủy đặt bàn thành công!', 'success');
                        await loadReservations();
                    } else {
                        showToast(result.message || 'Hủy đặt bàn thất bại.', 'error');
                    }
                } catch (e) {
                    showLoading(false);
                    console.error(e);
                    showToast('Lỗi kết nối máy chủ.', 'error');
                }
            }
        </script>
    </div>
</body>
</html>
