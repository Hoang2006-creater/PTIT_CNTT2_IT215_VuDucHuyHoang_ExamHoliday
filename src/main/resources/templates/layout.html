<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout-main(title, content)">
<head th:replace="~{fragments/header :: header-fragment(${title})}">
</head>
<body>
    <!-- Background shape elements -->
    <div class="bg-gradient-shapes"></div>

    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar-fragment}"></div>

        <!-- Main Content Panel -->
        <div class="main-content">
            <!-- Navbar -->
            <nav th:replace="~{fragments/navbar :: navbar-fragment}"></nav>

            <!-- Page Body Content -->
            <div class="content-body">
                <div th:replace="${content}"></div>
            </div>

            <!-- Footer -->
            <footer th:replace="~{fragments/footer :: footer-fragment}"></footer>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Global Application Scripts -->
    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/sidebar.js}"></script>
    <script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
