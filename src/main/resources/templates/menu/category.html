<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Danh mục thực đơn', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card p-4">
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <h3 class="text-white m-0"><i class="bi bi-tags-fill text-primary me-2"></i>Danh mục thực đơn</h3>
                        <a href="/menu" class="btn btn-outline-primary btn-sm"><i class="bi bi-arrow-left me-2"></i>Quay lại Thực đơn</a>
                    </div>
                    
                    <hr class="border-secondary mb-4">
                    
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Tên danh mục</th>
                                    <th>Mô tả chi tiết</th>
                                </tr>
                            </thead>
                            <tbody id="category-table-body">
                                <tr>
                                    <td colspan="3" class="text-center text-secondary py-4">Đang tải danh sách danh mục...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                const tableBody = document.getElementById('category-table-body');
                try {
                    const response = await customFetch('/api/categories');
                    if (response.ok) {
                        const result = await response.json();
                        if (result.success && result.data && result.data.length > 0) {
                            tableBody.innerHTML = '';
                            result.data.forEach(c => {
                                const tr = document.createElement('tr');
                                tr.innerHTML = `
                                    <td>${c.id}</td>
                                    <td class="text-white font-weight-bold">${c.name}</td>
                                    <td>${c.description || '<span class="text-secondary">Chưa có mô tả</span>'}</td>
                                `;
                                tableBody.appendChild(tr);
                            });
                            return;
                        }
                    }
                    tableBody.innerHTML = '<tr><td colspan="3" class="text-center text-secondary py-4">Chưa có danh mục món ăn.</td></tr>';
                } catch (e) {
                    console.error('Failed to load categories:', e);
                    tableBody.innerHTML = '<tr><td colspan="3" class="text-center text-danger py-4">Có lỗi xảy ra khi tải danh mục.</td></tr>';
                }
            });
        </script>
    </div>
</body>
</html>
