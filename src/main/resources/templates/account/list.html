<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Quản lý tài khoản', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card p-4">
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <h3 class="text-white m-0"><i class="bi bi-shield-lock-fill text-primary me-2"></i>Quản trị tài khoản</h3>
                        <a href="/accounts/create" class="btn btn-primary-glass btn-sm"><i class="bi bi-person-plus me-2"></i>Tạo tài khoản mới</a>
                    </div>
                    
                    <hr class="border-secondary mb-4">
                    
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Tên đăng nhập</th>
                                    <th>Số điện thoại</th>
                                    <th>Email</th>
                                    <th>Quyền hạn</th>
                                    <th>Trạng thái</th>
                                    <th class="text-end">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="accounts-table-body">
                                <tr>
                                    <td colspan="7" class="text-center text-secondary py-4">Đang tải danh sách tài khoản...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    const response = await customFetch('/api/users/manage/list'); // Assuming the API mapping exists
                    if (response.ok) {
                        const result = await response.json();
                        const tableBody = document.getElementById('accounts-table-body');
                        tableBody.innerHTML = '';
                        
                        if (result.success && result.data && result.data.length > 0) {
                            result.data.forEach(user => {
                                const tr = document.createElement('tr');
                                tr.innerHTML = `
                                    <td>${user.id}</td>
                                    <td class="text-primary font-weight-bold">${user.username}</td>
                                    <td>${user.phone}</td>
                                    <td>${user.email || '<span class="text-secondary">Chưa cập nhật</span>'}</td>
                                    <td><span class="badge bg-info">${user.role.name}</span></td>
                                    <td><span class="badge bg-${user.status === 'ACTIVE' ? 'success' : 'danger'}">${user.status}</span></td>
                                    <td class="text-end">
                                        <div class="btn-group gap-1">
                                            <a href="/accounts/detail/${user.id}" class="btn btn-outline-info btn-xs"><i class="bi bi-eye"></i></a>
                                            <a href="/accounts/edit/${user.id}" class="btn btn-outline-warning btn-xs"><i class="bi bi-pencil"></i></a>
                                        </div>
                                    </td>
                                `;
                                tableBody.appendChild(tr);
                            });
                        } else {
                            tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-secondary py-4">Không tìm thấy tài khoản nào.</td></tr>';
                        }
                    }
                } catch (e) {
                    console.error('Failed to load accounts list:', e);
                }
            });
        </script>
    </div>
</body>
</html>
