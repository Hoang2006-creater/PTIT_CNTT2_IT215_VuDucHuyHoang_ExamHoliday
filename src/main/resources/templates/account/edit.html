<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Chỉnh sửa tài khoản', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-md-8 mx-auto">
                <div class="glass-card p-4">
                    <h3 class="text-white mb-4"><i class="bi bi-pencil-square text-primary me-2"></i>Chỉnh sửa tài khoản</h3>
                    <hr class="border-secondary mb-4">
                    
                    <form id="edit-account-form">
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <label class="form-label text-secondary small">Tên đăng nhập (không thể thay đổi)</label>
                                <input type="text" class="form-control form-control-glass bg-dark text-muted" id="username" disabled>
                            </div>
                            <div class="col-sm-6">
                                <label for="phone" class="form-label text-secondary small">Số điện thoại</label>
                                <input type="text" class="form-control form-control-glass" id="phone" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="email" class="form-label text-secondary small">Địa chỉ Email</label>
                                <input type="email" class="form-control form-control-glass" id="email">
                            </div>
                            <div class="col-sm-6">
                                <label for="roleId" class="form-label text-secondary small">Quyền hạn</label>
                                <select class="form-select form-select-glass" id="roleId" required>
                                    <option value="1">ADMIN (Quản trị viên)</option>
                                    <option value="2">MANAGER (Quản lý)</option>
                                    <option value="3">WAITSTAFF (Phục vụ)</option>
                                    <option value="4">CASHIER (Thu ngân)</option>
                                    <option value="5">CHEF (Bếp trưởng)</option>
                                    <option value="6">CUSTOMER (Khách hàng)</option>
                                </select>
                            </div>
                            <div class="col-sm-6">
                                <label for="status" class="form-label text-secondary small">Trạng thái hoạt động</label>
                                <select class="form-select form-select-glass" id="status" required>
                                    <option value="ACTIVE">ACTIVE (Hoạt động)</option>
                                    <option value="BLOCKED">BLOCKED (Đã khóa)</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mt-5 d-flex gap-2">
                            <button type="submit" class="btn btn-primary-glass btn-sm"><i class="bi bi-save me-2"></i>Lưu thay đổi</button>
                            <a href="/accounts" class="btn btn-outline-light btn-sm"><i class="bi bi-x-lg me-2"></i>Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            const accountId = window.location.pathname.split('/').pop();

            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    const response = await customFetch(`/api/users/manage/detail/${accountId}`);
                    if (response.ok) {
                        const result = await response.json();
                        if (result.success && result.data) {
                            const user = result.data;
                            document.getElementById('username').value = user.username;
                            document.getElementById('phone').value = user.phone;
                            document.getElementById('email').value = user.email || '';
                            document.getElementById('roleId').value = user.role.id;
                            document.getElementById('status').value = user.status;
                        }
                    }
                } catch (e) {
                    console.error('Failed to load account details:', e);
                }
            });

            document.getElementById('edit-account-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const phone = document.getElementById('phone').value;
                const email = document.getElementById('email').value;
                const roleId = parseInt(document.getElementById('roleId').value);
                const status = document.getElementById('status').value;
                
                showLoading(true);
                try {
                    const response = await customFetch(`/api/users/manage/update/${accountId}`, {
                        method: 'PUT',
                        body: JSON.stringify({ phone, email, roleId, status })
                    });
                    showLoading(false);
                    const result = await response.json();
                    if (response.ok && result.success) {
                        showToast('Cập nhật tài khoản thành công!', 'success');
                        setTimeout(() => { window.location.href = '/accounts'; }, 1500);
                    } else {
                        showToast(result.message || 'Lỗi khi cập nhật.', 'error');
                    }
                } catch (err) {
                    showLoading(false);
                    showToast('Lỗi kết nối máy chủ.', 'error');
                }
            });
        </script>
    </div>
</body>
</html>
