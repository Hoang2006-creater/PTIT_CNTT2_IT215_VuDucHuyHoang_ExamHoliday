<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Đổi mật khẩu', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-md-6 mx-auto">
                <div class="glass-card p-4">
                    <h3 class="text-white mb-4"><i class="bi bi-shield-lock-fill text-primary me-2"></i>Thay đổi mật khẩu</h3>
                    <hr class="border-secondary mb-4">
                    
                    <form id="change-pass-form">
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label text-secondary small">Mật khẩu hiện tại</label>
                            <input type="password" class="form-control form-control-glass" id="oldPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label text-secondary small">Mật khẩu mới</label>
                            <input type="password" class="form-control form-control-glass" id="newPassword" required>
                        </div>
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label text-secondary small">Xác nhận mật khẩu mới</label>
                            <input type="password" class="form-control form-control-glass" id="confirmPassword" required>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary-glass btn-sm"><i class="bi bi-check-lg me-2"></i>Lưu thay đổi</button>
                            <a href="/profile" class="btn btn-outline-light btn-sm"><i class="bi bi-x-lg me-2"></i>Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            document.getElementById('change-pass-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const oldPassword = document.getElementById('oldPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (newPassword !== confirmPassword) {
                    showToast('Xác nhận mật khẩu mới không khớp!', 'error');
                    return;
                }
                
                showLoading(true);
                try {
                    const response = await customFetch('/api/auth/change-password', {
                        method: 'POST',
                        body: JSON.stringify({ oldPassword, newPassword })
                    });
                    showLoading(false);
                    const result = await response.json();
                    if (response.ok && result.success) {
                        showToast('Đổi mật khẩu thành công!', 'success');
                        setTimeout(() => { window.location.href = '/profile'; }, 1500);
                    } else {
                        showToast(result.message || 'Lỗi đổi mật khẩu.', 'error');
                    }
                } catch (err) {
                    showLoading(false);
                    showToast('Lỗi kết nối máy chủ.', 'error');
                }
            });
        </script>
    </div>
</body>
</html>
