<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Danh sách bàn ăn', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card p-4">
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <h3 class="text-white m-0"><i class="bi bi-grid text-primary me-2"></i>Quản lý bàn ăn</h3>
                        <a href="/tables/map" class="btn btn-outline-primary btn-sm"><i class="bi bi-map me-2"></i>Xem sơ đồ bàn</a>
                    </div>
                    
                    <hr class="border-secondary mb-4">
                    
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Số bàn</th>
                                    <th>Sức chứa</th>
                                    <th>Vị trí</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody id="tables-table-body">
                                <tr>
                                    <td colspan="5" class="text-center text-secondary py-4">Đang tải danh sách bàn ăn...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    const response = await customFetch('/api/tables'); // Assuming endpoint exists
                    if (response.ok) {
                        const result = await response.json();
                        const tableBody = document.getElementById('tables-table-body');
                        tableBody.innerHTML = '';
                        
                        if (result.success && result.data && result.data.length > 0) {
                            result.data.forEach(t => {
                                const tr = document.createElement('tr');
                                tr.innerHTML = `
                                    <td>${t.id}</td>
                                    <td class="text-white font-weight-bold">${t.tableNumber}</td>
                                    <td>${t.capacity} người</td>
                                    <td>${t.location || 'Chính'}</td>
                                    <td><span class="badge bg-${t.status === 'EMPTY' ? 'success' : (t.status === 'OCCUPIED' ? 'danger' : 'warning')}">${t.status}</span></td>
                                `;
                                tableBody.appendChild(tr);
                            });
                        } else {
                            tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-secondary py-4">Không tìm thấy bàn nào.</td></tr>';
                        }
                    }
                } catch (e) {
                    console.error('Failed to load tables:', e);
                }
            });
        </script>
    </div>
</body>
</html>
