<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Sơ đồ bàn ăn', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card p-4">
                    <h3 class="text-white mb-4"><i class="bi bi-map-fill text-primary me-2"></i>Sơ đồ bàn ăn</h3>
                    <hr class="border-secondary mb-4">
                    
                    <!-- Color legend -->
                    <div class="d-flex flex-wrap gap-4 mb-4">
                        <div class="d-flex align-items-center gap-2">
                            <div style="width: 20px; height: 20px; border-radius: 4px;" class="bg-success"></div>
                            <span class="text-secondary small">Trống (EMPTY)</span>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <div style="width: 20px; height: 20px; border-radius: 4px;" class="bg-danger"></div>
                            <span class="text-secondary small">Đang dùng (OCCUPIED)</span>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <div style="width: 20px; height: 20px; border-radius: 4px;" class="bg-warning"></div>
                            <span class="text-secondary small">Đã đặt trước (RESERVED)</span>
                        </div>
                    </div>
                    
                    <div class="row g-4" id="table-grid">
                        <div class="col-12 text-center text-secondary py-5">Đang vẽ sơ đồ bàn...</div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    const response = await customFetch('/api/tables');
                    if (response.ok) {
                        const result = await response.json();
                        const grid = document.getElementById('table-grid');
                        grid.innerHTML = '';
                        
                        if (result.success && result.data && result.data.length > 0) {
                            result.data.forEach(t => {
                                const col = document.createElement('div');
                                col.className = 'col-6 col-sm-4 col-md-3 col-lg-2';
                                
                                let statusBg = 'bg-success';
                                if (t.status === 'OCCUPIED') statusBg = 'bg-danger';
                                else if (t.status === 'RESERVED') statusBg = 'bg-warning';
                                
                                col.innerHTML = `
                                    <div class="card h-100 bg-dark border-secondary p-3 text-center">
                                        <div class="d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 60px; height: 60px; border-radius: 50%; font-size: 24px; color: white;" class="${statusBg}">
                                            <i class="bi bi-hash"></i>${t.tableNumber.replace(/\D/g, '')}
                                        </div>
                                        <h6 class="text-white mb-1">${t.tableNumber}</h6>
                                        <div class="text-secondary small mb-2">Sức chứa: ${t.capacity} người</div>
                                        <span class="badge ${statusBg}">${t.status}</span>
                                    </div>
                                `;
                                
                                // Make the circular icon have the status class
                                col.querySelector('.d-flex').classList.add(statusBg);
                                grid.appendChild(col);
                            });
                        } else {
                            grid.innerHTML = '<div class="col-12 text-center text-secondary py-5">Không có bàn ăn nào trong cơ sở dữ liệu.</div>';
                        }
                    }
                } catch (e) {
                    console.error('Failed to load table grid:', e);
                }
            });
        </script>
    </div>
</body>
</html>
