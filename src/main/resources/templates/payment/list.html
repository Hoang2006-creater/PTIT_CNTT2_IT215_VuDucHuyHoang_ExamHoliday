<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Quản lý thanh toán', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card p-4">
                    <h3 class="text-white mb-4"><i class="bi bi-wallet2 text-primary me-2"></i>Thanh toán hóa đơn</h3>
                    <hr class="border-secondary mb-4">
                    
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>Mã GD</th>
                                    <th>Mã hóa đơn</th>
                                    <th>Thời điểm GD</th>
                                    <th>Hình thức</th>
                                    <th>Số tiền đã thu</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody id="payments-table-body">
                                <tr>
                                    <td colspan="6" class="text-center text-secondary py-4">Đang tải lịch sử thanh toán...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    const response = await customFetch('/api/payments'); // Assuming endpoint exists
                    if (response.ok) {
                        const result = await response.json();
                        const tableBody = document.getElementById('payments-table-body');
                        tableBody.innerHTML = '';
                        
                        if (result.success && result.data && result.data.length > 0) {
                            result.data.forEach(p => {
                                const tr = document.createElement('tr');
                                const dt = new Date(p.paymentTime).toLocaleString('vi-VN');
                                tr.innerHTML = `
                                    <td>#${p.id}</td>
                                    <td>#${p.orderId}</td>
                                    <td>${dt}</td>
                                    <td><span class="badge bg-secondary">${p.paymentMethod}</span></td>
                                    <td class="text-success font-weight-bold">${p.amount.toLocaleString('vi-VN')}đ</td>
                                    <td><span class="badge bg-${p.status === 'SUCCESS' ? 'success' : 'danger'}">${p.status}</span></td>
                                `;
                                tableBody.appendChild(tr);
                            });
                        } else {
                            tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary py-4">Chưa có giao dịch thanh toán nào được thực hiện.</td></tr>';
                        }
                    }
                } catch (e) {
                    console.error('Failed to load payments:', e);
                }
            });
        </script>
    </div>
</body>
</html>
