<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Chi tiết khách hàng', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <!-- Left Column: Member Card -->
            <div class="col-md-4 mb-4">
                <div class="glass-card text-center p-4 h-100">
                    <div class="position-relative d-inline-block mb-3">
                        <div class="avatar-circle bg-primary text-white d-flex align-items-center justify-content-center rounded-circle mx-auto font-weight-bold" 
                             style="width: 80px; height: 80px; font-size: 2rem; box-shadow: 0 0 15px rgba(13, 110, 253, 0.4);" id="member-avatar">
                            U
                        </div>
                        <span class="position-absolute bottom-0 end-0 badge rounded-pill bg-warning text-dark font-weight-bold" 
                              id="member-class-badge" style="font-size: 0.75rem;">BRONZE</span>
                    </div>

                    <h4 class="text-white mb-1" id="member-fullName">Loading...</h4>
                    <p class="text-secondary small mb-3" id="member-username">@username</p>
                    
                    <hr class="border-secondary my-3">
                    
                    <div class="text-start">
                        <div class="mb-2">
                            <span class="text-secondary small d-block">Số điện thoại</span>
                            <span class="text-white" id="member-phone">-</span>
                        </div>
                        <div class="mb-2">
                            <span class="text-secondary small d-block">Địa chỉ Email</span>
                            <span class="text-white" id="member-email">-</span>
                        </div>
                        <div class="mb-2">
                            <span class="text-secondary small d-block">Điểm tích lũy</span>
                            <span class="text-warning font-weight-bold" id="member-points">0 điểm</span>
                        </div>
                        <div class="mb-2">
                            <span class="text-secondary small d-block">Tổng chi tiêu</span>
                            <span class="text-success font-weight-bold" id="member-totalSpent">0đ</span>
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-top border-secondary d-grid gap-2">
                        <a href="#" id="edit-btn-link" class="btn btn-warning-glass btn-sm"><i class="bi bi-pencil-square me-2"></i>Chỉnh sửa thông tin</a>
                        <a href="/customers" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-2"></i>Quay lại danh sách</a>
                    </div>
                </div>
            </div>

            <!-- Right Column: Actions & History -->
            <div class="col-md-8">
                <!-- Loyalty Points Adjustment -->
                <div class="glass-card p-4 mb-4">
                    <h5 class="text-white mb-3"><i class="bi bi-star-fill text-warning me-2"></i>Điều chỉnh điểm tích lũy thành viên</h5>
                    <form id="points-form">
                        <div class="row g-3 align-items-center">
                            <div class="col-md-6 col-sm-12">
                                <div class="input-group input-group-sm">
                                    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="adjustPointsField(-50)">-50</button>
                                    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="adjustPointsField(-10)">-10</button>
                                    <input type="number" id="points-input" class="form-control bg-dark text-white border-secondary text-center font-weight-bold" style="font-size: 1.1rem;" required min="0">
                                    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="adjustPointsField(10)">+10</button>
                                    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="adjustPointsField(50)">+50</button>
                                </div>
                            </div>
                            <div class="col-md-6 col-sm-12 d-flex gap-2">
                                <button type="submit" class="btn btn-primary-glass btn-sm flex-fill"><i class="bi bi-save me-2"></i>Cập nhật điểm số</button>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Order History -->
                <div class="glass-card p-4">
                    <h5 class="text-white mb-3"><i class="bi bi-clock-history text-info me-2"></i>Lịch sử gọi món tại nhà hàng</h5>
                    <div class="table-responsive" style="max-height: 380px;">
                        <table class="table table-dark table-hover table-striped align-middle">
                            <thead class="sticky-top bg-dark">
                                <tr>
                                    <th>Mã đơn</th>
                                    <th>Bàn ăn</th>
                                    <th>Thời điểm gọi</th>
                                    <th>Nhân viên</th>
                                    <th class="text-end">Tổng tiền</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody id="orders-history-body">
                                <tr>
                                    <td colspan="6" class="text-center text-secondary py-4">Đang tải lịch sử đơn hàng...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const customerId = window.location.pathname.split('/').pop();
            let currentPoints = 0;

            document.addEventListener('DOMContentLoaded', async () => {
                document.getElementById('edit-btn-link').href = `/customers/edit/${customerId}`;
                await loadCustomerDetails();
                await loadOrderHistory();

                // Points form submit handler
                document.getElementById('points-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const newPoints = parseInt(document.getElementById('points-input').value);
                    if (isNaN(newPoints) || newPoints < 0) {
                        alert('Điểm số phải lớn hơn hoặc bằng 0');
                        return;
                    }

                    try {
                        const response = await customFetch(`/api/customers/${customerId}/points`, {
                            method: 'PUT',
                            body: JSON.stringify({ loyaltyPoints: newPoints })
                        });
                        
                        if (response.ok) {
                            const result = await response.json();
                            if (result.success && result.data) {
                                alert('Cập nhật điểm thành viên thành công!');
                                await loadCustomerDetails();
                            } else {
                                alert('Lỗi: ' + (result.message || 'Không thể cập nhật'));
                            }
                        }
                    } catch (e) {
                        console.error('Failed to update loyalty points:', e);
                        alert('Đã xảy ra lỗi khi kết nối máy chủ');
                    }
                });
            });

            async function loadCustomerDetails() {
                try {
                    const response = await customFetch(`/api/customers/${customerId}`);
                    if (response.ok) {
                        const result = await response.json();
                        if (result.success && result.data) {
                            const cust = result.data;
                            currentPoints = cust.loyaltyPoints;
                            
                            // Left profile card
                            document.getElementById('member-fullName').textContent = cust.fullName;
                            document.getElementById('member-username').textContent = cust.username ? `@${cust.username}` : 'Không có tài khoản';
                            document.getElementById('member-phone').textContent = cust.phone;
                            document.getElementById('member-email').textContent = cust.email || 'Chưa cập nhật email';
                            document.getElementById('member-points').textContent = cust.loyaltyPoints + ' điểm';
                            document.getElementById('member-totalSpent').textContent = (cust.totalSpent || 0).toLocaleString('vi-VN') + 'đ';
                            
                            // Class badge and avatar color
                            const classBadge = document.getElementById('member-class-badge');
                            classBadge.textContent = cust.membershipClass;
                            classBadge.className = `position-absolute bottom-0 end-0 badge rounded-pill font-weight-bold text-dark ` + 
                                (cust.membershipClass === 'PLATINUM' ? 'bg-info' : 
                                 (cust.membershipClass === 'GOLD' ? 'bg-warning' : 
                                  (cust.membershipClass === 'SILVER' ? 'bg-light' : 'bg-secondary text-white')));

                            const initials = cust.fullName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                            const avatarDiv = document.getElementById('member-avatar');
                            avatarDiv.textContent = initials;

                            // Form field
                            document.getElementById('points-input').value = cust.loyaltyPoints;
                        }
                    }
                } catch (e) {
                    console.error('Failed to load customer details:', e);
                }
            }

            async function loadOrderHistory() {
                try {
                    const response = await customFetch(`/api/customers/${customerId}/orders`);
                    if (response.ok) {
                        const result = await response.json();
                        const historyBody = document.getElementById('orders-history-body');
                        historyBody.innerHTML = '';

                        if (result.success && result.data && result.data.length > 0) {
                            result.data.forEach(order => {
                                const tr = document.createElement('tr');
                                const dt = new Date(order.orderTime).toLocaleString('vi-VN');
                                tr.innerHTML = `
                                    <td>#${order.id}</td>
                                    <td class="text-white font-weight-bold">${order.tableNumber}</td>
                                    <td>${dt}</td>
                                    <td>${order.employeeName}</td>
                                    <td class="text-success font-weight-bold text-end">${order.totalAmount.toLocaleString('vi-VN')}đ</td>
                                    <td><span class="badge bg-${order.status === 'COMPLETED' ? 'success' : (order.status === 'OPEN' ? 'primary' : 'danger')}">${order.status}</span></td>
                                `;
                                historyBody.appendChild(tr);
                            });
                        } else {
                            historyBody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary py-4">Khách hàng chưa có lịch sử gọi món nào.</td></tr>';
                        }
                    }
                } catch (e) {
                    console.error('Failed to load customer order history:', e);
                }
            }

            function adjustPointsField(offset) {
                const input = document.getElementById('points-input');
                let val = parseInt(input.value) || 0;
                val = Math.max(0, val + offset);
                input.value = val;
            }
        </script>
    </div>
</body>
</html>
