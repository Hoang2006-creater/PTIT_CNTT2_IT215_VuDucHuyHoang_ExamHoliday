<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Chi tiết khách hàng', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-md-8 mx-auto">
                <div class="glass-card p-4">
                    <h3 class="text-white mb-4"><i class="bi bi-info-circle-fill text-primary me-2"></i>Chi tiết thông tin khách hàng</h3>
                    <hr class="border-secondary mb-4">
                    
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <label class="form-label text-secondary small">Họ và tên khách hàng</label>
                            <div class="text-white font-weight-bold" id="detail-fullName">Loading...</div>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label text-secondary small">Số điện thoại liên hệ</label>
                            <div class="text-white" id="detail-phone">Loading...</div>
                        </div>
                        <div class="col-sm-6 mt-4">
                            <label class="form-label text-secondary small">Điểm tích lũy thành viên</label>
                            <div class="text-warning font-weight-bold" id="detail-loyaltyPoints">Loading...</div>
                        </div>
                        <div class="col-sm-6 mt-4">
                            <label class="form-label text-secondary small">Hạng thành viên</label>
                            <div><span class="badge bg-secondary" id="detail-membershipClass">Loading...</span></div>
                        </div>
                    </div>
                    
                    <div class="mt-5 d-flex gap-2">
                        <a href="#" id="edit-btn-link" class="btn btn-warning-glass btn-sm"><i class="bi bi-pencil-square me-2"></i>Chỉnh sửa</a>
                        <a href="/customers" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-2"></i>Quay lại</a>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const customerId = window.location.pathname.split('/').pop();

            document.addEventListener('DOMContentLoaded', async () => {
                document.getElementById('edit-btn-link').href = `/customers/edit/${customerId}`;
                try {
                    const response = await customFetch(`/api/customers/${customerId}`);
                    if (response.ok) {
                        const result = await response.json();
                        if (result.success && result.data) {
                            const cust = result.data;
                            document.getElementById('detail-fullName').textContent = cust.fullName;
                            document.getElementById('detail-phone').textContent = cust.phone;
                            document.getElementById('detail-loyaltyPoints').textContent = cust.loyaltyPoints + ' điểm';
                            document.getElementById('detail-membershipClass').textContent = cust.membershipClass;
                        }
                    }
                } catch (e) {
                    console.error('Failed to load customer details:', e);
                }
            });
        </script>
    </div>
</body>
</html>
