<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Thêm khách hàng mới', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-md-8 mx-auto">
                <div class="glass-card p-4">
                    <h3 class="text-white mb-4"><i class="bi bi-person-plus text-primary me-2"></i>Thêm khách hàng mới</h3>
                    <hr class="border-secondary mb-4">
                    
                    <form id="create-customer-form">
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <label for="fullName" class="form-label text-secondary small">Họ và tên khách hàng</label>
                                <input type="text" class="form-control form-control-glass" id="fullName" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="phone" class="form-label text-secondary small">Số điện thoại</label>
                                <input type="text" class="form-control form-control-glass" id="phone" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="loyaltyPoints" class="form-label text-secondary small">Điểm tích lũy ban đầu</label>
                                <input type="number" class="form-control form-control-glass" id="loyaltyPoints" value="0" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="membershipClass" class="form-label text-secondary small">Hạng thành viên</label>
                                <select class="form-select form-select-glass" id="membershipClass" required>
                                    <option value="BRONZE" selected>BRONZE (Đồng)</option>
                                    <option value="SILVER">SILVER (Bạc)</option>
                                    <option value="GOLD">GOLD (Vàng)</option>
                                    <option value="PLATINUM">PLATINUM (Bạch kim)</option>
                                </select>
                            </div>
                            <div class="col-sm-6">
                                <label for="userId" class="form-label text-secondary small">Liên kết tài khoản đăng nhập (ID)</label>
                                <input type="number" class="form-control form-control-glass" id="userId" placeholder="Nếu có tài khoản online...">
                            </div>
                        </div>
                        
                        <div class="mt-5 d-flex gap-2">
                            <button type="submit" class="btn btn-primary-glass btn-sm"><i class="bi bi-check-lg me-2"></i>Thêm khách hàng</button>
                            <a href="/customers" class="btn btn-outline-light btn-sm"><i class="bi bi-x-lg me-2"></i>Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            document.getElementById('create-customer-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const fullName = document.getElementById('fullName').value;
                const phone = document.getElementById('phone').value;
                const loyaltyPoints = parseInt(document.getElementById('loyaltyPoints').value);
                const membershipClass = document.getElementById('membershipClass').value;
                const val = document.getElementById('userId').value;
                const userId = val ? parseInt(val) : null;
                
                showLoading(true);
                try {
                    const response = await customFetch('/api/customers', {
                        method: 'POST',
                        body: JSON.stringify({ fullName, phone, loyaltyPoints, membershipClass, userId })
                    });
                    showLoading(false);
                    const result = await response.json();
                    if (response.ok && result.success) {
                        showToast('Thêm khách hàng thành công!', 'success');
                        setTimeout(() => { window.location.href = '/customers'; }, 1500);
                    } else {
                        showToast(result.message || 'Lỗi khi thêm khách hàng.', 'error');
                    }
                } catch (err) {
                    showLoading(false);
                    showToast('Lỗi kết nối máy chủ.', 'error');
                }
            });
        </script>
    </div>
</body>
</html>
