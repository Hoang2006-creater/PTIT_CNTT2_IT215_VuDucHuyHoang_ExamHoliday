<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="~{layout-customer :: layout-main('RMS - Đổi mật khẩu', ~{::div#change-pass-content})}">
<body>
    <div id="change-pass-content">
        <!-- Header Banner -->
        <section class="py-5 text-center text-white" style="background: linear-gradient(rgba(15, 15, 22, 0.8), rgba(15, 15, 22, 0.8)), url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?q=80&w=1200') no-repeat center center/cover; padding-top: 80px !important;">
            <div class="container py-4">
                <h1 class="display-4 font-serif text-white fw-bold">Đổi Mật Khẩu</h1>
                <p class="text-secondary Montserrat mb-0" style="letter-spacing: 1px;">Bảo mật tài khoản của bạn bằng cách cập nhật mật khẩu định kỳ.</p>
            </div>
        </section>

        <!-- Change Password Form Section -->
        <section class="py-5" style="background: #09090d;">
            <div class="container py-3">
                <div class="row justify-content-center">
                    <div class="col-12 col-md-6 col-lg-5">
                        <div class="glass-card p-4 rounded-4 border border-secondary shadow-lg">
                            <h4 class="text-white font-serif mb-4 text-center"><i class="bi bi-shield-lock text-gold me-2"></i>Thay Đổi Mật Khẩu</h4>
                            <form id="customerChangePassForm">
                                <div class="mb-3">
                                    <label for="oldPassword" class="form-label text-white-50 small">Mật khẩu cũ</label>
                                    <input type="password" class="form-control form-control-glass" id="oldPassword" placeholder="Nhập mật khẩu hiện tại..." required>
                                </div>
                                <div class="mb-3">
                                    <label for="newPassword" class="form-label text-white-50 small">Mật khẩu mới</label>
                                    <input type="password" class="form-control form-control-glass" id="newPassword" placeholder="Nhập mật khẩu mới..." required>
                                    <div class="form-text text-secondary small">Mật khẩu phải chứa ít nhất 6 ký tự.</div>
                                </div>
                                <div class="mb-4">
                                    <label for="confirmNewPassword" class="form-label text-white-50 small">Xác nhận mật khẩu mới</label>
                                    <input type="password" class="form-control form-control-glass" id="confirmNewPassword" placeholder="Xác nhận lại mật khẩu mới..." required>
                                </div>
                                <button type="submit" class="btn btn-primary-glass w-100 py-3"><i class="bi bi-check-lg me-2"></i>Cập Nhật Mật Khẩu</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>


    <!-- Script integrations -->
    <script th:src="@{/js/common.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('customerChangePassForm');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const oldPassword = document.getElementById('oldPassword').value;
                    const newPassword = document.getElementById('newPassword').value;
                    const confirmPassword = document.getElementById('confirmNewPassword').value;

                    if (newPassword.length < 6) {
                        showToast('Mật khẩu mới phải dài tối thiểu 6 ký tự.', 'error');
                        return;
                    }

                    if (newPassword !== confirmPassword) {
                        showToast('Mật khẩu xác nhận không trùng khớp.', 'error');
                        return;
                    }

                    showLoading(true);
                    try {
                        const response = await customFetch('/api/auth/change-password', {
                            method: 'POST',
                            body: JSON.stringify({ oldPassword, newPassword })
                        });
                        const result = await response.json();
                        showLoading(false);
                        if (response.ok && result.success) {
                            showToast('Đổi mật khẩu thành công!', 'success');
                            form.reset();
                            setTimeout(() => {
                                window.location.href = '/profile';
                            }, 1000);
                        } else {
                            showToast(result.message || 'Thay đổi mật khẩu thất bại.', 'error');
                        }
                    } catch (err) {
                        showLoading(false);
                        showToast('Lỗi kết nối máy chủ.', 'error');
                    }
                });
            }
        });
    </script>
    </div>
</body>
</html>
