<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Quản lý khách hàng', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card p-4">
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <h3 class="text-white m-0"><i class="bi bi-person-badge-fill text-primary me-2"></i>Quản lý khách hàng</h3>
                        <a href="/customers/create" class="btn btn-primary-glass btn-sm"><i class="bi bi-person-plus me-2"></i>Thêm khách hàng mới</a>
                    </div>
                    
                    <hr class="border-secondary mb-4">
                    
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Họ và tên</th>
                                    <th>Số điện thoại</th>
                                    <th>Điểm tích lũy</th>
                                    <th>Hạng thành viên</th>
                                    <th class="text-end">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="customers-table-body">
                                <tr>
                                    <td colspan="6" class="text-center text-secondary py-4">Đang tải danh sách khách hàng...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    const response = await customFetch('/api/customers'); // Assuming endpoint exists
                    if (response.ok) {
                        const result = await response.json();
                        const tableBody = document.getElementById('customers-table-body');
                        tableBody.innerHTML = '';
                        
                        if (result.success && result.data && result.data.length > 0) {
                            result.data.forEach(cust => {
                                const tr = document.createElement('tr');
                                tr.innerHTML = `
                                    <td>${cust.id}</td>
                                    <td class="text-white font-weight-bold">${cust.fullName}</td>
                                    <td>${cust.phone}</td>
                                    <td><span class="text-warning">${cust.loyaltyPoints}</span></td>
                                    <td><span class="badge bg-secondary">${cust.membershipClass}</span></td>
                                    <td class="text-end">
                                        <div class="btn-group gap-1">
                                            <a href="/customers/detail/${cust.id}" class="btn btn-outline-info btn-xs"><i class="bi bi-eye"></i></a>
                                            <a href="/customers/edit/${cust.id}" class="btn btn-outline-warning btn-xs"><i class="bi bi-pencil"></i></a>
                                        </div>
                                    </td>
                                `;
                                tableBody.appendChild(tr);
                            });
                        } else {
                            tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary py-4">Không tìm thấy khách hàng nào.</td></tr>';
                        }
                    }
                } catch (e) {
                    console.error('Failed to load customers list:', e);
                }
            });
        </script>
    </div>
</body>
</html>
