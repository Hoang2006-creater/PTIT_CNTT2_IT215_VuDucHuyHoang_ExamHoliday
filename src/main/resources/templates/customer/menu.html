<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="~{layout-customer :: layout-main('RMS - Thực đơn', ~{::div#menu-content})}">
<body>
    <div id="menu-content">
        <!-- Header Banner -->
        <section class="py-5 text-center text-white" style="background: linear-gradient(rgba(15, 15, 22, 0.8), rgba(15, 15, 22, 0.8)), url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?q=80&w=1200') no-repeat center center/cover; padding-top: 80px !important;">
            <div class="container py-4">
                <h1 class="display-4 font-serif text-white fw-bold">Thực Đơn Nhà Hàng</h1>
                <p class="text-secondary Montserrat mb-0" style="letter-spacing: 1px;">Khám phá các món ăn hảo vị được chọn lọc từ tinh hoa ẩm thực.</p>
            </div>
        </section>

        <!-- Menu Navigation and Grid -->
        <section class="py-5" style="background: #09090d;">
            <div class="container">
                <div class="row g-4">
                    <!-- Sidebar: Search and Categories -->
                    <div class="col-12 col-lg-3">
                        <div class="glass-card p-4 rounded-4 border border-secondary sticky-top" style="top: 100px; z-index: 10;">
                            <!-- Search Form -->
                            <div class="mb-4">
                                <h5 class="text-white font-serif mb-3">Tìm Kiếm</h5>
                                <div class="input-group">
                                    <input type="text" class="form-control form-control-glass" id="searchKeyword" placeholder="Nhập tên món ăn...">
                                    <button class="btn btn-primary-glass px-3" id="btnSearch"><i class="bi bi-search"></i></button>
                                </div>
                            </div>

                            <!-- Categories -->
                            <div>
                                <h5 class="text-white font-serif mb-3">Danh Mục</h5>
                                <div class="d-flex flex-column gap-2" id="categories-list">
                                    <button class="btn btn-outline-light text-start border-0 py-2 active" data-cat-id="all">Tất cả món ăn</button>
                                    <!-- Dynamic categories list -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Main List Panel -->
                    <div class="col-12 col-lg-9">
                        <div class="row g-4" id="menu-items-grid">
                            <!-- Loading items placeholder -->
                            <div class="col-12 text-center text-secondary py-5">
                                <div class="spinner-border text-gold" role="status"></div>
                                <p class="mt-2">Đang tải danh sách món ăn...</p>
                            </div>
                        </div>

                        <!-- Pagination -->
                        <div class="d-flex justify-content-center mt-5">
                            <nav aria-label="Page navigation" id="pagination-nav" class="d-none">
                                <ul class="pagination pagination-dark gap-2">
                                    <li class="page-item" id="page-prev-li">
                                        <button class="page-link rounded-circle d-flex align-items-center justify-content-center" id="page-prev-btn" style="width: 40px; height: 40px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff;"><i class="bi bi-chevron-left"></i></button>
                                    </li>
                                    <!-- Page items -->
                                    <li class="page-item" id="page-next-li">
                                        <button class="page-link rounded-circle d-flex align-items-center justify-content-center" id="page-next-btn" style="width: 40px; height: 40px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff;"><i class="bi bi-chevron-right"></i></button>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Item Detail & Options Modal -->
        <div class="modal fade" id="itemDetailModal" tabindex="-1" aria-labelledby="itemDetailModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content text-white" style="background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid var(--border-glass); border-radius: 16px;">
                    <div class="modal-header border-bottom border-secondary">
                        <h4 class="modal-title font-serif text-gold" id="modalItemName">Chi Tiết Món Ăn</h4>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-4">
                        <div class="row g-4">
                            <div class="col-12 col-md-5">
                                <img src="" class="img-fluid rounded-3 border border-secondary" id="modalItemImage" style="width: 100%; height: 260px; object-fit: cover;" alt="">
                            </div>
                            <div class="col-12 col-md-7 d-flex flex-column">
                                <span class="badge bg-secondary-glass mb-2 align-self-start" id="modalItemCategory" style="font-size: 11px;">Món chính</span>
                                <h3 class="font-serif text-white mb-2" id="modalItemTitle">Tên món</h3>
                                <p class="text-gold font-weight-bold fs-4 mb-3" id="modalItemPrice">0đ</p>
                                <p class="text-secondary small mb-4" id="modalItemDesc">Mô tả món ăn...</p>

                                <div class="mb-3">
                                    <label for="modalItemNotes" class="form-label text-white-50 small">Ghi chú (Ví dụ: ít cay, nhiều hành...)</label>
                                    <input type="text" class="form-control form-control-glass" id="modalItemNotes" placeholder="Thêm ghi chú đặc biệt cho đầu bếp...">
                                </div>

                                <div class="mt-auto d-flex align-items-center gap-3">
                                    <div class="input-group" style="width: 130px;">
                                        <button class="btn btn-outline-light border-secondary" type="button" id="btnMinus"><i class="bi bi-dash"></i></button>
                                        <input type="text" class="form-control form-control-glass text-center font-weight-bold" id="itemQuantity" value="1" readonly>
                                        <button class="btn btn-outline-light border-secondary" type="button" id="btnPlus"><i class="bi bi-plus"></i></button>
                                    </div>
                                    <button class="btn btn-primary-glass flex-grow-1 py-3" id="btnAddToCartModal"><i class="bi bi-cart-plus me-2"></i>Thêm Vào Giỏ Hàng</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>


    <!-- Script integrations -->
    <script th:src="@{/js/common.js}"></script>
    <script>
        let currentCategory = 'all';
        let currentSearch = '';
        let currentPage = 0;
        const itemsPerPage = 6;
        let favoriteIds = [];
        let selectedItemForModal = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // Check url params for category filter redirect
            const urlParams = new URLSearchParams(window.location.search);
            const catParam = urlParams.get('category');
            if (catParam) {
                currentCategory = catParam;
            }

            // Load user favorites list if authenticated
            if (getCookie('accessToken')) {
                await loadFavoritesList();
            }

            // Load Categories in sidebar
            await loadMenuCategories();

            // Load items
            await fetchMenuItems();

            // Setup Event Listeners
            document.getElementById('btnSearch').addEventListener('click', () => {
                currentSearch = document.getElementById('searchKeyword').value.trim();
                currentPage = 0;
                fetchMenuItems();
            });

            document.getElementById('searchKeyword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    currentSearch = document.getElementById('searchKeyword').value.trim();
                    currentPage = 0;
                    fetchMenuItems();
                }
            });

            // Modal quantity buttons
            const quantityInput = document.getElementById('itemQuantity');
            document.getElementById('btnMinus').addEventListener('click', () => {
                let val = parseInt(quantityInput.value);
                if (val > 1) quantityInput.value = val - 1;
            });
            document.getElementById('btnPlus').addEventListener('click', () => {
                let val = parseInt(quantityInput.value);
                quantityInput.value = val + 1;
            });

            // Add to Cart from modal
            document.getElementById('btnAddToCartModal').addEventListener('click', async () => {
                if (!selectedItemForModal) return;
                const qty = parseInt(quantityInput.value);
                const notes = document.getElementById('modalItemNotes').value.trim();
                
                await executeAddToCart(selectedItemForModal.id, qty, notes);
                
                // Hide modal
                const modal = bootstrap.Modal.getInstance(document.getElementById('itemDetailModal'));
                if (modal) modal.hide();
            });
        });

        async function loadFavoritesList() {
            try {
                const response = await customFetch('/api/customer/favorites');
                if (response.ok) {
                    const result = await response.json();
                    if (result.success && result.data) {
                        favoriteIds = result.data.map(fav => fav.menuItemId);
                    }
                }
            } catch (err) {
                console.error('Failed to load favorites list:', err);
            }
        }

        async function loadMenuCategories() {
            const container = document.getElementById('categories-list');
            if (!container) return;

            try {
                const response = await fetch('/api/categories');
                if (response.ok) {
                    const result = await response.json();
                    if (result.success && result.data && result.data.length > 0) {
                        result.data.forEach(cat => {
                            const btn = document.createElement('button');
                            btn.className = 'btn btn-outline-light text-start border-0 py-2';
                            btn.textContent = cat.name;
                            btn.setAttribute('data-cat-id', cat.id);
                            if (currentCategory.toString() === cat.id.toString()) {
                                // Select this category
                                document.querySelector('[data-cat-id="all"]')?.classList.remove('active');
                                btn.classList.add('active');
                            }
                            
                            btn.addEventListener('click', (e) => {
                                document.querySelectorAll('#categories-list button').forEach(b => b.classList.remove('active'));
                                btn.classList.add('active');
                                currentCategory = cat.id;
                                currentPage = 0;
                                fetchMenuItems();
                            });
                            container.appendChild(btn);
                        });

                        // Set event for "All" button
                        const allBtn = document.querySelector('[data-cat-id="all"]');
                        if (allBtn) {
                            allBtn.addEventListener('click', () => {
                                document.querySelectorAll('#categories-list button').forEach(b => b.classList.remove('active'));
                                allBtn.classList.add('active');
                                currentCategory = 'all';
                                currentPage = 0;
                                fetchMenuItems();
                            });
                        }
                    }
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function fetchMenuItems() {
            const grid = document.getElementById('menu-items-grid');
            if (!grid) return;

            grid.innerHTML = `
                <div class="col-12 text-center text-secondary py-5">
                    <div class="spinner-border text-gold" role="status"></div>
                    <p class="mt-2">Đang tải danh sách món ăn...</p>
                </div>
            `;

            let url = `/api/customer/menu?page=${currentPage}&size=${itemsPerPage}`;
            if (currentSearch) {
                url = `/api/customer/menu/search?keyword=${encodeURIComponent(currentSearch)}&page=${currentPage}&size=${itemsPerPage}`;
            } else if (currentCategory !== 'all') {
                url = `/api/customer/categories/${currentCategory}/menu?page=${currentPage}&size=${itemsPerPage}`;
            }

            try {
                const response = await fetch(url);
                if (response.ok) {
                    const result = await response.json();
                    if (result.success && result.data && result.data.content && result.data.content.length > 0) {
                        grid.innerHTML = '';
                        const items = result.data.content;
                        items.forEach(item => {
                            const isFav = favoriteIds.includes(item.id);
                            const heartClass = isFav ? 'bi-heart-fill text-danger' : 'bi-heart text-secondary';
                            const priceStr = (item.price || 0).toLocaleString('vi-VN') + 'đ';
                            const imageSrc = item.imageUrl || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=400';

                            const col = document.createElement('div');
                            col.className = 'col-12 col-sm-6 col-md-4';
                            col.innerHTML = `
                                <div class="glass-card h-100 rounded-4 border border-secondary shadow-sm overflow-hidden d-flex flex-column position-relative">
                                    <button class="position-absolute top-0 end-0 m-3 btn btn-dark rounded-circle d-flex align-items-center justify-content-center p-2 border-0 shadow" style="background: rgba(0,0,0,0.6); z-index: 5;" onclick="toggleFavorite(${item.id}, event)">
                                        <i class="bi ${heartClass} fs-5" id="fav-icon-${item.id}"></i>
                                    </button>
                                    <div class="position-relative overflow-hidden" style="height: 200px; cursor: pointer;" onclick="openItemDetailModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                                        <img src="${imageSrc}" class="w-100 h-100 zoom-effect" style="object-fit: cover;" alt="${item.name}">
                                    </div>
                                    <div class="p-3 d-flex flex-column flex-grow-1">
                                        <div class="d-flex align-items-center justify-content-between mb-2">
                                            <span class="badge bg-secondary-glass" style="font-size: 10px;">${item.categoryName}</span>
                                            <span class="text-gold font-weight-bold" style="font-size: 1.15rem;">${priceStr}</span>
                                        </div>
                                        <h5 class="text-white font-serif mb-2" style="cursor: pointer;" onclick="openItemDetailModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">${item.name}</h5>
                                        <p class="text-secondary small text-truncate-3 mb-4 flex-grow-1">${item.description || 'Chuẩn hương vị hảo hạng chuẩn Fine Dining.'}</p>
                                        <div class="d-flex gap-2 mt-auto">
                                            <button onclick="openItemDetailModal(${JSON.stringify(item).replace(/"/g, '&quot;')})" class="btn btn-outline-light btn-sm flex-grow-1 py-2" style="border-color: rgba(255,255,255,0.15);"><i class="bi bi-info-circle me-1"></i> Chi tiết</button>
                                            <button onclick="addToCartQuickly(${item.id})" class="btn btn-primary-glass btn-sm px-3"><i class="bi bi-cart-plus"></i></button>
                                        </div>
                                    </div>
                                </div>
                            `;
                            grid.appendChild(col);
                        });

                        // Render Pagination
                        renderPaginationControls(result.data.totalPages);
                        return;
                    }
                }
                grid.innerHTML = '<div class="col-12 text-center text-secondary py-5">Không tìm thấy món ăn nào phù hợp.</div>';
                const nav = document.getElementById('pagination-nav');
                if (nav) nav.classList.add('d-none');
            } catch (err) {
                console.error(err);
                grid.innerHTML = '<div class="col-12 text-center text-danger py-5">Không thể tải danh sách món ăn.</div>';
                const nav = document.getElementById('pagination-nav');
                if (nav) nav.classList.add('d-none');
            }
        }

        function renderPaginationControls(totalPages) {
            const nav = document.getElementById('pagination-nav');
            if (!nav) return;

            if (totalPages <= 1) {
                nav.classList.add('d-none');
                return;
            }

            nav.classList.remove('d-none');
            const prevLi = document.getElementById('page-prev-li');
            const nextLi = document.getElementById('page-next-li');
            const prevBtn = document.getElementById('page-prev-btn');
            const nextBtn = document.getElementById('page-next-btn');

            // Remove existing page buttons (except prev and next)
            const list = nav.querySelector('ul');
            list.querySelectorAll('.page-number-li').forEach(el => el.remove());

            // Disable prev/next buttons
            if (currentPage === 0) {
                prevLi.classList.add('disabled');
                prevBtn.style.opacity = '0.5';
            } else {
                prevLi.classList.remove('disabled');
                prevBtn.style.opacity = '1';
            }

            if (currentPage === totalPages - 1) {
                nextLi.classList.add('disabled');
                nextBtn.style.opacity = '0.5';
            } else {
                nextLi.classList.remove('disabled');
                nextBtn.style.opacity = '1';
            }

            // Create page number items
            for (let i = 0; i < totalPages; i++) {
                const li = document.createElement('li');
                li.className = `page-item page-number-li ${i === currentPage ? 'active' : ''}`;
                
                const btnClass = i === currentPage ? 'bg-primary border-primary text-dark' : 'bg-transparent border-secondary text-white';
                
                li.innerHTML = `
                    <button class="page-link rounded-circle d-flex align-items-center justify-content-center ${btnClass}" style="width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.1); font-weight: 600;">${i + 1}</button>
                `;
                
                li.querySelector('button').addEventListener('click', () => {
                    currentPage = i;
                    fetchMenuItems();
                });
                
                list.insertBefore(li, nextLi);
            }

            // Setup listeners for prev/next
            prevBtn.onclick = () => {
                if (currentPage > 0) {
                    currentPage--;
                    fetchMenuItems();
                }
            };

            nextBtn.onclick = () => {
                if (currentPage < totalPages - 1) {
                    currentPage++;
                    fetchMenuItems();
                }
            };
        }

        function openItemDetailModal(item) {
            selectedItemForModal = item;
            
            document.getElementById('modalItemName').textContent = item.categoryName;
            document.getElementById('modalItemTitle').textContent = item.name;
            document.getElementById('modalItemCategory').textContent = item.categoryName;
            document.getElementById('modalItemPrice').textContent = (item.price || 0).toLocaleString('vi-VN') + 'đ';
            document.getElementById('modalItemDesc').textContent = item.description || 'Chuẩn hương vị ẩm thực thượng hạng, nguyên liệu tự nhiên tươi ngon.';
            document.getElementById('modalItemImage').src = item.imageUrl || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=400';
            
            document.getElementById('itemQuantity').value = 1;
            document.getElementById('modalItemNotes').value = '';

            const modal = new bootstrap.Modal(document.getElementById('itemDetailModal'));
            modal.show();
        }

        async function addToCartQuickly(itemId) {
            await executeAddToCart(itemId, 1, '');
        }

        async function executeAddToCart(itemId, quantity, notes) {
            if (!getCookie('accessToken')) {
                showToast('Vui lòng đăng nhập trước khi thêm món ăn vào giỏ hàng.', 'warning');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1200);
                return;
            }

            showLoading(true);
            try {
                const response = await customFetch('/api/customer/cart/add', {
                    method: 'POST',
                    body: JSON.stringify({ menuItemId: itemId, quantity, notes })
                });
                const result = await response.json();
                showLoading(false);
                if (response.ok && result.success) {
                    showToast('Đã thêm món ăn vào giỏ hàng!', 'success');
                    if (typeof updateNavbarCartCount === 'function') {
                        updateNavbarCartCount();
                    }
                } else {
                    showToast(result.message || 'Thêm vào giỏ hàng thất bại.', 'error');
                }
            } catch (err) {
                showLoading(false);
                showToast('Không thể kết nối đến máy chủ.', 'error');
            }
        }

        async function toggleFavorite(itemId, event) {
            if (event) event.stopPropagation();

            if (!getCookie('accessToken')) {
                showToast('Vui lòng đăng nhập để yêu thích món ăn.', 'warning');
                return;
            }

            const icon = document.getElementById(`fav-icon-${itemId}`);
            const isFav = favoriteIds.includes(itemId);

            showLoading(true);
            try {
                if (isFav) {
                    // Remove from favorites
                    const response = await customFetch(`/api/customer/favorites/remove/${itemId}`, {
                        method: 'DELETE'
                    });
                    showLoading(false);
                    if (response.ok) {
                        favoriteIds = favoriteIds.filter(id => id !== itemId);
                        if (icon) {
                            icon.className = 'bi bi-heart text-secondary';
                        }
                        showToast('Đã xóa khỏi danh sách yêu thích.', 'success');
                    }
                } else {
                    // Add to favorites
                    const response = await customFetch('/api/customer/favorites/add', {
                        method: 'POST',
                        body: JSON.stringify({ menuItemId: itemId })
                    });
                    showLoading(false);
                    if (response.ok) {
                        favoriteIds.push(itemId);
                        if (icon) {
                            icon.className = 'bi bi-heart-fill text-danger';
                        }
                        showToast('Đã thêm vào danh sách yêu thích.', 'success');
                    }
                }
            } catch (err) {
                showLoading(false);
                showToast('Lỗi kết nối máy chủ.', 'error');
            }
        }
    </script>
    </div>
</body>
</html>
