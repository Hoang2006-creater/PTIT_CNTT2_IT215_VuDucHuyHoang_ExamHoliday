<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Chi tiết nhân viên', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-md-8 mx-auto">
                <div class="glass-card p-4">
                    <h3 class="text-white mb-4"><i class="bi bi-info-circle-fill text-primary me-2"></i>Chi tiết hồ sơ nhân viên</h3>
                    <hr class="border-secondary mb-4">
                    
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <label class="form-label text-secondary small">Họ và tên nhân viên</label>
                            <div class="text-white font-weight-bold" id="detail-fullName">Loading...</div>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label text-secondary small">Vị trí công việc</label>
                            <div class="text-white" id="detail-position">Loading...</div>
                        </div>
                        <div class="col-sm-6 mt-4">
                            <label class="form-label text-secondary small">Lương cơ bản</label>
                            <div class="text-success font-weight-bold" id="detail-salary">Loading...</div>
                        </div>
                        <div class="col-sm-6 mt-4">
                            <label class="form-label text-secondary small">Ngày bắt đầu làm việc</label>
                            <div class="text-white" id="detail-hireDate">Loading...</div>
                        </div>
                        <div class="col-sm-6 mt-4">
                            <label class="form-label text-secondary small">Trạng thái làm việc</label>
                            <div><span class="badge" id="detail-status">Loading...</span></div>
                        </div>
                    </div>
                    
                    <div class="mt-5 d-flex gap-2">
                        <a href="#" id="edit-btn-link" class="btn btn-warning-glass btn-sm"><i class="bi bi-pencil-square me-2"></i>Chỉnh sửa</a>
                        <a href="/employees" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-2"></i>Quay lại</a>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const employeeId = window.location.pathname.split('/').pop();

            document.addEventListener('DOMContentLoaded', async () => {
                document.getElementById('edit-btn-link').href = `/employees/edit/${employeeId}`;
                try {
                    const response = await customFetch(`/api/employees/${employeeId}`);
                    if (response.ok) {
                        const result = await response.json();
                        if (result.success && result.data) {
                            const emp = result.data;
                            document.getElementById('detail-fullName').textContent = emp.fullName;
                            document.getElementById('detail-position').textContent = emp.position;
                            document.getElementById('detail-salary').textContent = emp.salary.toLocaleString('vi-VN') + 'đ';
                            document.getElementById('detail-hireDate').textContent = emp.hireDate;
                            
                            const statusBadge = document.getElementById('detail-status');
                            statusBadge.textContent = emp.status;
                            statusBadge.className = `badge bg-${emp.status === 'WORKING' ? 'success' : 'secondary'}`;
                        }
                    }
                } catch (e) {
                    console.error('Failed to load employee details:', e);
                }
            });
        </script>
    </div>
</body>
</html>
