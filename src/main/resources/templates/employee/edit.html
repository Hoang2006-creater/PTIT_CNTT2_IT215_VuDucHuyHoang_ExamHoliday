<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Chỉnh sửa nhân viên', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-md-8 mx-auto">
                <div class="glass-card p-4">
                    <h3 class="text-white mb-4"><i class="bi bi-pencil-square text-primary me-2"></i>Chỉnh sửa thông tin nhân viên</h3>
                    <hr class="border-secondary mb-4">
                    
                    <form id="edit-employee-form">
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <label for="fullName" class="form-label text-secondary small">Họ và tên nhân viên</label>
                                <input type="text" class="form-control form-control-glass" id="fullName" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="position" class="form-label text-secondary small">Vị trí công việc</label>
                                <input type="text" class="form-control form-control-glass" id="position" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="salary" class="form-label text-secondary small">Lương cơ bản (đ)</label>
                                <input type="number" class="form-control form-control-glass" id="salary" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="hireDate" class="form-label text-secondary small">Ngày bắt đầu làm việc</label>
                                <input type="date" class="form-control form-control-glass" id="hireDate" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="status" class="form-label text-secondary small">Trạng thái làm việc</label>
                                <select class="form-select form-select-glass" id="status" required>
                                    <option value="WORKING">WORKING (Đang làm việc)</option>
                                    <option value="RESIGNED">RESIGNED (Đã nghỉ việc)</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mt-5 d-flex gap-2">
                            <button type="submit" class="btn btn-primary-glass btn-sm"><i class="bi bi-save me-2"></i>Lưu thay đổi</button>
                            <a href="/employees" class="btn btn-outline-light btn-sm"><i class="bi bi-x-lg me-2"></i>Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            const employeeId = window.location.pathname.split('/').pop();

            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    const response = await customFetch(`/api/employees/${employeeId}`);
                    if (response.ok) {
                        const result = await response.json();
                        if (result.success && result.data) {
                            const emp = result.data;
                            document.getElementById('fullName').value = emp.fullName;
                            document.getElementById('position').value = emp.position;
                            document.getElementById('salary').value = emp.salary;
                            document.getElementById('hireDate').value = emp.hireDate;
                            document.getElementById('status').value = emp.status;
                        }
                    }
                } catch (e) {
                    console.error('Failed to load employee details:', e);
                }
            });

            document.getElementById('edit-employee-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const fullName = document.getElementById('fullName').value;
                const position = document.getElementById('position').value;
                const salary = parseFloat(document.getElementById('salary').value);
                const hireDate = document.getElementById('hireDate').value;
                const status = document.getElementById('status').value;
                
                showLoading(true);
                try {
                    const response = await customFetch(`/api/employees/${employeeId}`, {
                        method: 'PUT',
                        body: JSON.stringify({ fullName, position, salary, hireDate, status })
                    });
                    showLoading(false);
                    const result = await response.json();
                    if (response.ok && result.success) {
                        showToast('Cập nhật nhân viên thành công!', 'success');
                        setTimeout(() => { window.location.href = '/employees'; }, 1500);
                    } else {
                        showToast(result.message || 'Lỗi khi cập nhật.', 'error');
                    }
                } catch (err) {
                    showLoading(false);
                    showToast('Lỗi kết nối máy chủ.', 'error');
                }
            });
        </script>
    </div>
</body>
</html>
