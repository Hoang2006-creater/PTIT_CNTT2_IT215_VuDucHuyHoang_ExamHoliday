<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout-main('RMS - Quản lý nhân viên', ~{::div#content})}">
<body>
    <div id="content">
        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card p-4">
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <h3 class="text-white m-0"><i class="bi bi-people-fill text-primary me-2"></i>Quản trị nhân viên</h3>
                        <a href="/employees/create" class="btn btn-primary-glass btn-sm"><i class="bi bi-person-plus me-2"></i>Thêm nhân viên mới</a>
                    </div>
                    
                    <hr class="border-secondary mb-4">
                    
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Họ và tên</th>
                                    <th>Chức vụ</th>
                                    <th>Ngày vào làm</th>
                                    <th>Lương cơ bản</th>
                                    <th>Trạng thái</th>
                                    <th class="text-end">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="employees-table-body">
                                <tr>
                                    <td colspan="7" class="text-center text-secondary py-4">Đang tải danh sách nhân viên...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    const response = await customFetch('/api/employees'); // Assuming endpoint exists
                    if (response.ok) {
                        const result = await response.json();
                        const tableBody = document.getElementById('employees-table-body');
                        tableBody.innerHTML = '';
                        
                        if (result.success && result.data && result.data.length > 0) {
                            result.data.forEach(emp => {
                                const tr = document.createElement('tr');
                                tr.innerHTML = `
                                    <td>${emp.id}</td>
                                    <td class="text-white font-weight-bold">${emp.fullName}</td>
                                    <td>${emp.position}</td>
                                    <td>${emp.hireDate}</td>
                                    <td>${emp.salary.toLocaleString('vi-VN')}đ</td>
                                    <td><span class="badge bg-${emp.status === 'WORKING' ? 'success' : 'secondary'}">${emp.status}</span></td>
                                    <td class="text-end">
                                        <div class="btn-group gap-1">
                                            <a href="/employees/detail/${emp.id}" class="btn btn-outline-info btn-xs"><i class="bi bi-eye"></i></a>
                                            <a href="/employees/edit/${emp.id}" class="btn btn-outline-warning btn-xs"><i class="bi bi-pencil"></i></a>
                                        </div>
                                    </td>
                                `;
                                tableBody.appendChild(tr);
                            });
                        } else {
                            tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-secondary py-4">Không tìm thấy nhân viên nào.</td></tr>';
                        }
                    }
                } catch (e) {
                    console.error('Failed to load employees list:', e);
                }
            });
        </script>
    </div>
</body>
</html>
